# cert-manager wildcard Certificate — used for IN-CLUSTER TLS only.
# (External ALB TLS comes from ACM via aws_acm_certificate.platform in Terraform.)
#
# Use case: tenant pods that need mTLS to internal services, or service-mesh
# certificates. Tenants reference this secret by name in their workloads.
#
# Stored in cert-manager namespace and synced into tenant namespaces via reflector
# or duplicated as needed. The ClusterIssuer in cert-manager-issuer.yaml is the
# real shared resource — tenants create their own Certificate objects pointing
# at letsencrypt-prod.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-wildcard
  namespace: cert-manager
spec:
  secretName: platform-talkit-chat-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.platform.talkit.chat"
  dnsNames:
    - "*.platform.talkit.chat"
    - "platform.talkit.chat"
  duration: 2160h      # 90 days (Let's Encrypt default)
  renewBefore: 360h    # Renew 15 days before expiry
