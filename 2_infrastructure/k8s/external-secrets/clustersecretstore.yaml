# ClusterSecretStore — platform-level ESO store backed by AWS Secrets Manager.
# Uses IRSA (aws_iam_role.external_secrets in iam.tf) — no static credentials.
# Tenant ExternalSecrets reference this store and pull from their scoped paths.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
