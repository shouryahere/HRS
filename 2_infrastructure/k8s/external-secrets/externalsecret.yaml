# Per-tenant ExternalSecret templates.
# Each team's secrets are fetched from Secrets Manager path hrs/<team>/*
# and materialised as Kubernetes Secrets in the tenant namespace.
# Values are never written to etcd — ESO fetches them fresh at each sync.
---
# team-01
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: team-secrets
  namespace: team-01
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: team-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "{{ .db_url }}"
        API_KEY: "{{ .api_key }}"
  data:
    - secretKey: db_url
      remoteRef:
        key: hrs/team-01/db-url
    - secretKey: api_key
      remoteRef:
        key: hrs/team-01/api-key
