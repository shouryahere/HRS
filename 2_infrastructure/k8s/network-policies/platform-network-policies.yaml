# Platform namespace network policies — SUPERSEDED.
#
# This file previously defined vanilla NetworkPolicy objects for the argocd,
# cert-manager, external-secrets, and kyverno namespaces. Those policies are no
# longer applied to the cluster because port-only egress rules do not reliably
# allow traffic to the kube-apiserver ClusterIP (172.20.0.1:443) when Cilium is
# running in ENI chaining mode on top of the AWS VPC CNI.
#
# Root cause: a Cilium identity-resolution race at pod startup. Pods open
# connections before Cilium has resolved their security identity; the resulting
# conntrack entries carry SourceSecurityID=0 and are never matched by subsequent
# policy evaluation, producing persistent i/o timeouts to the API server. The
# only reliable fix is to name `kube-apiserver` as a reserved Cilium entity in
# a CiliumNetworkPolicy egress rule, which forces correct identity resolution.
#
# Current platform-namespace policy lives in:
#   platform-cilium-network-policies.yaml
#
# Tenant namespace policies (which use vanilla NetworkPolicy without hitting
# this race because tenant pods don't talk to kube-apiserver directly) remain
# in tenant-network-policies.yaml.
