# Tenant network policies — applied to every team namespace.
# Layer 2 of 5-layer isolation (Namespace → Cilium NetPol → RBAC → IRSA → Kyverno).
#
# Rules:
#   1. Default deny all ingress + egress within the namespace.
#   2. Allow intra-namespace pod-to-pod (team services talk to each other).
#   3. Allow egress to kube-dns (UDP/TCP 53) — required for service discovery.
#   4. Allow egress to the RDS Proxy port (5432) in the VPC.
#   5. Allow ingress from the ingress-nginx / ALB controller namespace.
#   6. Block cross-namespace pod-to-pod (enforced by Cilium eBPF).
---
# Default deny-all for team-01
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: team-01
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: team-01
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: team-01
spec:
  podSelector: {}
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rds-proxy
  namespace: team-01
spec:
  podSelector: {}
  egress:
    - ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: team-01
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
