# Tenant network policies — applied to every team namespace.
# Layer 2 of 5-layer isolation (Namespace → Cilium NetPol → RBAC → IRSA → Kyverno).
#
# Rules:
#   1. Default deny all ingress + egress within the namespace.
#   2. Allow intra-namespace pod-to-pod (team services talk to each other).
#   3. Allow egress to kube-dns (UDP/TCP 53) — required for service discovery.
#   4. Allow egress to the RDS Proxy port (5432) in the VPC.
#   5. Allow ingress from the VPC CIDR (ALB → pod, target-type: ip).
#      Excludes private subnets to block direct pod-to-pod across namespaces.
#   6. Block cross-namespace pod-to-pod (enforced by Cilium eBPF).
---
# Default deny-all for team-01
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: team-01
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: team-01
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: team-01
spec:
  podSelector: {}
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rds-proxy
  namespace: team-01
spec:
  podSelector: {}
  egress:
    - ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alb-ingress
  namespace: team-01
spec:
  podSelector: {}
  ingress:
    # AWS Load Balancer Controller uses target-type: ip — traffic arrives from
    # ALB ENIs in public subnets (10.0.1.0/24, 10.0.2.0/24, 10.0.3.0/24).
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
            except:
              - 10.0.11.0/24
              - 10.0.12.0/24
              - 10.0.13.0/24
---
