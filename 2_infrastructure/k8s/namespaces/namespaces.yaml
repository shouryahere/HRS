# Per-tenant namespaces — one per engineering team.
# PSS restricted enforced at namespace level (layer 1 of 5-layer isolation).
# Add new teams by duplicating this pattern; ArgoCD ApplicationSet picks them up automatically.
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-01
  labels:
    team: team-01
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-02
  labels:
    team: team-02
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-03
  labels:
    team: team-03
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
