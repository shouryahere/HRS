# Resource quotas + LimitRanges — enforce fair-use across tenants.
# CPU/memory quota values come from the teams variable in Terraform (10 CPU / 20Gi per team).
# LimitRange sets per-pod defaults so unpinned containers don't steal quota.
---
# team-01
apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-quota
  namespace: team-01
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
    secrets: "50"
    configmaps: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: team-limits
  namespace: team-01
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
