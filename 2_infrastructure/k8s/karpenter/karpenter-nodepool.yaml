# Karpenter v1.0 NodePool + EC2NodeClass.
# Uses NodePool (not deprecated v0.x Provisioner) and EC2NodeClass (not AWSNodeTemplate).
#
# Strategy: on-demand base (2 nodes) + spot burst for cost-optimised scale-out.
# Consolidation enabled — Karpenter right-sizes nodes and terminates underutilised ones.
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2@latest
  role: hrs-platform-eks-node-role  # Must match aws_iam_role.eks_node.name in iam.tf

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: hrs-platform

  securityGroupSelectorTerms:
    - tags:
        Name: hrs-platform-nodes-sg

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true

  tags:
    ManagedBy: karpenter
    Project: hrs-platform
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        node.hrs-platform/managed-by: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.medium
            - t3.large
            - t3.xlarge
            - m5.large
            - m5.xlarge
            - m5.2xlarge
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - eu-central-1a
            - eu-central-1b
            - eu-central-1c
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s

  limits:
    cpu: "100"
    memory: 200Gi
