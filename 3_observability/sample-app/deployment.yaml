# Sample app deployment for ${TEAM_ID}.
# Demonstrates: IRSA ServiceAccount, ESO secret injection, OTel env vars,
# node-local collector endpoint via Downward API.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: ${TEAM_ID}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      serviceAccountName: workload  # IRSA-annotated SA from rbac.yaml
      securityContext:
        runAsNonRoot: true
        runAsUser: 101    # nginx-unprivileged uid
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault  # PSS restricted requirement
      containers:
        - name: app
          # ECR_REGISTRY/AWS_ACCOUNT_ID are substituted by ArgoCD Image Updater at deploy time.
          # For initial bootstrap, run: envsubst < deployment.yaml | kubectl apply -f -
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/hrs-platform/${TEAM_ID}/app:latest
          ports:
            - containerPort: 8080  # nginx-unprivileged listens on 8080
          env:
            - name: TEAM_ID
              value: ${TEAM_ID}
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: team-secrets   # Materialised by ESO ExternalSecret
                  key: DATABASE_URL
            # Send traces to the node-local OTel Collector DaemonSet
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4317"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_SERVICE_NAME
              value: ${TEAM_ID}-sample-app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: ${TEAM_ID}
spec:
  selector:
    app: sample-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  namespace: ${TEAM_ID}
  annotations:
    # AWS Load Balancer Controller — provisions an ALB and points it at this Service.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443},{"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERT_ARN}  # From terraform output acm_certificate_arn
spec:
  rules:
    - host: ${TEAM_ID}.platform.talkit.chat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port:
                  number: 80
