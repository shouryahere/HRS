# Sample app deployment for team-01.
# Demonstrates: IRSA ServiceAccount, ESO secret injection, OTel env vars,
# node-local collector endpoint via Downward API.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: team-01
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      serviceAccountName: workload  # IRSA-annotated SA from rbac.yaml
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: <ACCOUNT_ID>.dkr.ecr.eu-central-1.amazonaws.com/hrs-platform/team-01/app:latest
          ports:
            - containerPort: 8000
          env:
            - name: TEAM_ID
              value: team-01
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: team-secrets   # Materialised by ESO ExternalSecret
                  key: DATABASE_URL
            # Send traces to the node-local OTel Collector DaemonSet
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4317"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_SERVICE_NAME
              value: team-01-sample-app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: team-01
spec:
  selector:
    app: sample-app
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  namespace: team-01
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - team-01.platform.hrstravel.com
      secretName: platform-hrstravel-com-tls
  rules:
    - host: team-01.platform.hrstravel.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port:
                  number: 80
